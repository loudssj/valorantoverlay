<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Valorant Ultra Inmortal Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent !important;
            overflow: hidden;
            display: flex;
            align-items: center;
            height: 100vh;
            font-family: 'Syncopate', sans-serif;
        }

        #overlay-container {
            display: flex;
            align-items: center;
            padding: 20px;
        }

        #rank-icon {
            width: 100px;
            height: 100px;
            margin-right: 15px;
            display: none;
            /* Aura roja de fondo para el logo */
            filter: drop-shadow(0px 0px 25px rgba(179, 0, 10, 0.8));
            animation: pulseLogo 2s ease-in-out infinite;
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        #full-text {
            text-transform: uppercase;
            white-space: nowrap;
            font-size: 50px;
            font-weight: 700;
            letter-spacing: -2px;
            position: relative;
            
            /* --- DEGRADADO ROJO OSCURO A NEGRO --- */
            background: linear-gradient(to bottom, #b3000a 20%, #000000 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

            /* --- SOMBRAS NEGRAS DEFINIDAS (SIN BORDE) --- */
            filter: drop-shadow(3px 3px 2px rgba(0, 0, 0, 1));
        }

        /* --- BRILLO METÁLICO REFORZADO --- */
        #full-text::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, 
                transparent 0%, 
                transparent 40%, 
                rgba(255, 255, 255, 0.8) 50%, 
                transparent 60%, 
                transparent 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s infinite linear;
            z-index: 2;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div id="overlay-container">
        <img id="rank-icon" src="" alt="rank">
        <div id="full-text" data-text="CARGANDO...">CARGANDO...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
